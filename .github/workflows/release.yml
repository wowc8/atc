name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin --bundles dmg"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Python deps
        run: |
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build Python sidecar
        run: |
          mkdir -p src-tauri/binaries
          pyinstaller --onefile --distpath dist src/atc/server_main.py --name atc-server \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import aiosqlite \
            --hidden-import sqlite3 \
            --hidden-import anthropic
          mv dist/atc-server "src-tauri/binaries/atc-server-${{ matrix.rust_target }}"
          chmod +x "src-tauri/binaries/atc-server-${{ matrix.rust_target }}"

      - name: Generate macOS .icns icon
        if: runner.os == 'macOS'
        run: |
          ICONSET=src-tauri/icons/AppIcon.iconset
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src-tauri/icons/1024x1024.png --out "$ICONSET/icon_${size}x${size}.png" 2>/dev/null
            sips -z $((size*2)) $((size*2)) src-tauri/icons/1024x1024.png --out "$ICONSET/icon_${size}x${size}@2x.png" 2>/dev/null
          done
          iconutil -c icns "$ICONSET" -o src-tauri/icons/icon.icns

      - name: Generate Linux/Windows icons
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y imagemagick
          convert src-tauri/icons/32x32.png src-tauri/icons/icon.ico 2>/dev/null || cp src-tauri/icons/32x32.png src-tauri/icons/icon.png

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ATC ${{ github.ref_name }}"
          releaseBody: "Release candidate build."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          args: ${{ matrix.args }}
